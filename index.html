const sb = {
  from: (table) => ({
    _table: table,
    _filters: [],
    _order: null,
    _limit: null,
    _select: '*',
    select(cols) { this._select = cols || '*'; return this; },
    eq(col, val) { this._filters.push(`${col}=eq.${encodeURIComponent(val)}`); return this; },
    neq(col, val) { this._filters.push(`${col}=neq.${encodeURIComponent(val)}`); return this; },
    gte(col, val) { this._filters.push(`${col}=gte.${encodeURIComponent(val)}`); return this; },
    lte(col, val) { this._filters.push(`${col}=lte.${encodeURIComponent(val)}`); return this; },
    ilike(col, val) { this._filters.push(`${col}=ilike.${encodeURIComponent(val)}`); return this; },
    order(col, opts) { this._order = `${col}.${opts && opts.ascending===false?'desc':'asc'}`; return this; },
    limit(n) { this._limit = n; return this; },
    _buildUrl(method) {
      let url = `${SUPABASE_URL}/rest/v1/${this._table}`;
      const params = [];
      if (method === 'GET') params.push(`select=${this._select}`);
      this._filters.forEach(f => params.push(f));
      if (this._order) params.push(`order=${this._order}`);
      if (this._limit) params.push(`limit=${this._limit}`);
      if (params.length) url += '?' + params.join('&');
      return url;
    },
    _headers(extra) {
      return Object.assign({
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      }, extra || {});
    },
    async _req(method, body) {
      try {
        const res = await fetch(this._buildUrl(method), {
          method,
          headers: this._headers(),
          body: body ? JSON.stringify(body) : undefined
        });
        if (!res.ok) { const err = await res.text(); return { data: null, error: err }; }
        const data = await res.json();
        return { data, error: null };
      } catch(e) { return { data: null, error: e.message }; }
    },
    async get() { return this._req('GET'); },
    async insert(row) {
      return fetch(`${SUPABASE_URL}/rest/v1/${this._table}`, {
        method: 'POST',
        headers: this._headers(),
        body: JSON.stringify(Array.isArray(row) ? row : [row])
      }).then(async r => ({data: r.ok ? await r.json() : null, error: r.ok ? null : await r.text()}))
        .catch(e => ({data:null,error:e.message}));
    },
    async update(row) {
      let qs = this._filters.join('&');
      const fullUrl = `${SUPABASE_URL}/rest/v1/${this._table}${qs?'?'+qs:''}`;
      return fetch(fullUrl, {
        method: 'PATCH',
        headers: this._headers(),
        body: JSON.stringify(row)
      }).then(async r => ({data: r.ok ? await r.json() : null, error: r.ok ? null : await r.text()}))
        .catch(e => ({data:null,error:e.message}));
    },
    async delete() {
      let qs = this._filters.join('&');
      const fullUrl = `${SUPABASE_URL}/rest/v1/${this._table}${qs?'?'+qs:''}`;
      return fetch(fullUrl, {
        method: 'DELETE',
        headers: this._headers({'Prefer':'return=minimal'})
      }).then(async r => ({data: null, error: r.ok ? null : await r.text()}))
        .catch(e => ({data:null,error:e.message}));
    },
    async upsert(row) {
      return fetch(`${SUPABASE_URL}/rest/v1/${this._table}`, {
        method: 'POST',
        headers: this._headers({'Prefer':'resolution=merge-duplicates,return=representation'}),
        body: JSON.stringify(Array.isArray(row) ? row : [row])
      }).then(async r => ({data: r.ok ? await r.json() : null, error: r.ok ? null : await r.text()}))
        .catch(e => ({data:null,error:e.message}));
    }
  })
};

const fmtTime = d => { const h=String(d.getHours()).padStart(2,'0'),m=String(d.getMinutes()).padStart(2,'0'),s=String(d.getSeconds()).padStart(2,'0'); return h+':'+m+':'+s; };
const fmtDate = d => d.toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
const fmtShort = s => { try { return new Date(s).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}); } catch(e) { return s; }};
const todayStr = () => new Date().toISOString().split('T')[0];
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const isLate = (ci, ss) => { const[h1,m1]=ci.split(':').map(Number); const[h2,m2]=ss.split(':').map(Number); return h1>h2||(h1===h2&&m1>m2); };
const haversine = (a,b,c,d) => { const R=6371000,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180,x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)**2; return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)); };
const fmtDist = m => m<1000 ? `${Math.round(m)}m` : `${(m/1000).toFixed(1)}km`;
const fmtCoords = l => `${l.lat.toFixed(6)}, ${l.lng.toFixed(6)}`;
const fmtAgo = ts => { const d=Date.now()-new Date(ts).getTime(),m=Math.floor(d/60000); if(m<1)return'Baru saja'; if(m<60)return`${m} menit lalu`; const hh=Math.floor(m/60); if(hh<24)return`${hh} jam lalu`; return`${Math.floor(hh/24)} hari lalu`; };

const getGeo = () => new Promise(res => {
  if(!navigator.geolocation){res(null);return;}
  navigator.geolocation.getCurrentPosition(async pos => {
    const loc = {lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:Math.round(pos.coords.accuracy)};
    try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${loc.lat}&lon=${loc.lng}&zoom=18`,{headers:{'Accept-Language':'id'}});const d=await r.json();if(d.display_name)loc.address=d.display_name.split(',').slice(0,3).join(',').trim();}catch(e){}
    res(loc);
  }, ()=>res(null), {enableHighAccuracy:true,timeout:10000,maximumAge:0});
});

function genDevice() {
  const cv=document.createElement('canvas'),ctx=cv.getContext('2d');cv.width=200;cv.height=50;
  ctx.textBaseline='top';ctx.font='14px Arial';ctx.fillStyle='#f60';ctx.fillRect(125,1,62,20);
  ctx.fillStyle='#069';ctx.fillText('DeviceFingerprint',2,15);ctx.fillStyle='rgba(102,204,0,0.7)';ctx.fillText('AbsenKu2024',4,35);
  const raw=[cv.toDataURL(),navigator.userAgent,navigator.language,screen.width+'x'+screen.height,screen.colorDepth,new Date().getTimezoneOffset(),navigator.hardwareConcurrency||0,navigator.deviceMemory||0,navigator.maxTouchPoints||0,navigator.platform||''].join('|');
  let hash=0; for(let i=0;i<raw.length;i++){hash=((hash<<5)-hash)+raw.charCodeAt(i);hash=hash&hash;}
  const id='DVC-'+Math.abs(hash).toString(36).toUpperCase().padStart(8,'0').slice(0,8);
  const ua=navigator.userAgent;
  let browser='Unknown'; if(ua.includes('Firefox'))browser='Firefox'; else if(ua.includes('Edg'))browser='Edge'; else if(ua.includes('Chrome'))browser='Chrome'; else if(ua.includes('Safari'))browser='Safari';
  let os='Unknown'; if(ua.includes('Windows'))os='Windows'; else if(ua.includes('Mac OS'))os='macOS'; else if(ua.includes('Android'))os='Android'; else if(ua.includes('iPhone')||ua.includes('iPad'))os='iOS'; else if(ua.includes('Linux'))os='Linux';
  return {id, name:`${browser} on ${os}`, browser, os, screen:`${screen.width}x${screen.height}`, registeredAt:new Date().toISOString()};
}

// ============================================================
// EXPORT EXCEL SISWA (per kelas atau semua)
// ============================================================
const exportStudentsExcel = (students, filterKelas) => {
  if(!window.XLSX){alert('Library Excel belum siap, coba lagi.');return;}
  const XLSX = window.XLSX;
  const wb = XLSX.utils.book_new();
  const kelasList = filterKelas ? [filterKelas] : [...new Set(students.map(s=>s.kelas))].sort();
  
  kelasList.forEach(kelas => {
    const siswa = students.filter(s => s.kelas === kelas);
    const data = [
      ['No','Kode Siswa','Nama Lengkap','Kelas','NIS','No. HP','Status'],
      ...siswa.map((s,i) => [i+1, s.studentCode, s.name, s.kelas, s.nis||'-', s.phone||'-', s.active?'Aktif':'Nonaktif'])
    ];
    const ws = XLSX.utils.aoa_to_sheet(data);
    // Lebar kolom
    ws['!cols'] = [{wch:5},{wch:12},{wch:25},{wch:14},{wch:12},{wch:15},{wch:10}];
    const sheetName = kelas.replace(/[:\/?*[\]]/g,'').slice(0,31);
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  });
  
  // Sheet template import
  const tmpl = [
    ['Kode Siswa','Nama Lengkap','Password','Kelas','NIS','No. HP'],
    ['SIS099','Contoh Nama','123456','XII IPA 1','2024099','08123456789']
  ];
  const wsTmpl = XLSX.utils.aoa_to_sheet(tmpl);
  wsTmpl['!cols'] = [{wch:12},{wch:25},{wch:10},{wch:14},{wch:12},{wch:15}];
  XLSX.utils.book_append_sheet(wb, wsTmpl, 'TEMPLATE IMPORT');
  
  const fname = filterKelas ? 'siswa_'+filterKelas.replace(/\s/g,'_')+'.xlsx' : 'data_siswa_semua_kelas.xlsx';
  XLSX.writeFile(wb, fname);
};

// ============================================================
// IMPORT SISWA DARI EXCEL
// ============================================================
const importStudentsExcel = (file, existingStudents, onImport) => {
  if(!window.XLSX){alert('Library Excel belum siap.');return;}
  const XLSX = window.XLSX;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1});
      // Skip header row
      const newStudents = [];
      const errors = [];
      for(let i=1; i<rows.length; i++){
        const row = rows[i];
        if(!row || !row[0] || !row[1]) continue;
        const code = String(row[0]).trim();
        const name = String(row[1]).trim();
        const pass = String(row[2]||'123456').trim();
        const kelas = String(row[3]||'').trim();
        const nis = String(row[4]||'').trim();
        const phone = String(row[5]||'').trim();
        if(existingStudents.some(s=>s.studentCode.toLowerCase()===code.toLowerCase())){
          errors.push('ID '+code+' sudah ada, dilewati');
          continue;
        }
        newStudents.push({id:uid(),studentCode:code,name,password:pass,kelas,nis,phone,active:true,createdAt:new Date().toISOString()});
      }
      if(newStudents.length===0){alert('Tidak ada data baru. '+errors.join('\n'));return;}
      const konfirm = confirm(newStudents.length+' siswa akan diimport.\n'+(errors.length>0?'Dilewati: '+errors.length+' baris (ID duplikat)\n':'')+'Lanjutkan?');
      if(!konfirm) return;
      onImport(newStudents, errors);
    } catch(err) {
      alert('Gagal baca file: '+err.message);
    }
  };
  reader.readAsBinaryString(file);
};

// ============================================================
// EXPORT PDF ABSENSI (harian/mingguan/bulanan/tahunan + foto)
// ============================================================
const exportPDF = async (records, students, settings, mode, filterKelas) => {
  if(!window.jspdf){alert('Library PDF belum siap, coba lagi.');return;}
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
  
  const W = 210, H = 297;
  const margin = 14;
  const colW = [12, 18, 48, 22, 22, 18, 22]; // No,Tanggal,Nama,Masuk,Status,Pulang,Kelas
  const colX = colW.reduce((acc,w,i)=>{ acc.push(i===0?margin:(acc[i-1]||margin)+colW[i-1]); return acc; },[]);
  
  // Judul periode
  const now = new Date();
  let periodeLabel = '';
  let filteredRec = [...records];
  if(filterKelas) filteredRec = filteredRec.filter(r=>{ const s=students.find(x=>x.id===r.studentId); return s&&s.kelas===filterKelas; });
  
  if(mode==='daily'){
    periodeLabel = 'Harian - '+now.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    filteredRec = filteredRec.filter(r=>r.date===todayStr());
  } else if(mode==='weekly'){
    const startOfWeek = new Date(now); startOfWeek.setDate(now.getDate()-now.getDay()+1);
    const endOfWeek = new Date(startOfWeek); endOfWeek.setDate(startOfWeek.getDate()+6);
    const s = startOfWeek.toISOString().split('T')[0];
    const e = endOfWeek.toISOString().split('T')[0];
    filteredRec = filteredRec.filter(r=>r.date>=s&&r.date<=e);
    periodeLabel = 'Mingguan - '+startOfWeek.toLocaleDateString('id-ID',{day:'numeric',month:'short'})+' s/d '+endOfWeek.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
  } else if(mode==='monthly'){
    const mm = String(now.getMonth()+1).padStart(2,'0');
    const yy = now.getFullYear();
    filteredRec = filteredRec.filter(r=>r.date.startsWith(yy+'-'+mm));
    periodeLabel = 'Bulanan - '+now.toLocaleDateString('id-ID',{month:'long',year:'numeric'});
  } else if(mode==='yearly'){
    const yy = now.getFullYear();
    filteredRec = filteredRec.filter(r=>r.date.startsWith(yy+''));
    periodeLabel = 'Tahunan - '+yy;
  }
  
  filteredRec.sort((a,b)=>a.date.localeCompare(b.date)||a.studentName.localeCompare(b.studentName));
  
  // Kelompokkan per tanggal jika bukan harian
  const groupByDate = {};
  filteredRec.forEach(r=>{ if(!groupByDate[r.date]) groupByDate[r.date]=[]; groupByDate[r.date].push(r); });
  
  let pageNum = 1;
  let yPos = 0;
  
  const addHeader = (isFirstPage) => {
    // Background header
    doc.setFillColor(10,10,26);
    doc.rect(0,0,W,36,'F');
    doc.setFillColor(0,240,255);
    doc.rect(0,34,W,1,'F');
    
    doc.setTextColor(0,240,255);
    doc.setFontSize(18);
    doc.setFont('helvetica','bold');
    doc.text('ABSENSI', margin, 14);
    doc.setTextColor(168,85,247);
    doc.text('KU', margin+32, 14);
    
    doc.setTextColor(200,200,200);
    doc.setFontSize(8);
    doc.setFont('helvetica','normal');
    doc.text(settings.schoolName||'AbsensiKu', margin, 20);
    doc.text('Laporan Absensi Siswa', margin, 25);
    doc.text(periodeLabel, margin, 30);
    if(filterKelas) doc.text('Kelas: '+filterKelas, W-margin-45, 20);
    doc.text('Dicetak: '+now.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})+' '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0'), W-margin-60, 30);
    
    // Statistik ringkas di kanan
    const hadir = filteredRec.filter(r=>r.clockIn).length;
    const telat = filteredRec.filter(r=>r.clockIn&&isLate(r.clockIn,settings.schoolStart)).length;
    doc.setTextColor(0,255,136);
    doc.setFontSize(7);
    doc.text('Total: '+filteredRec.length+' | Hadir: '+hadir+' | Telat: '+telat, W-margin-60, 25);
    
    yPos = 40;
  };
  
  const addTableHeader = () => {
    doc.setFillColor(20,20,40);
    doc.rect(margin-1, yPos-3, W-margin*2+2, 7, 'F');
    doc.setTextColor(0,240,255);
    doc.setFontSize(7);
    doc.setFont('helvetica','bold');
    const headers = ['No','Tanggal','Nama Siswa','Masuk','Status','Pulang','Kelas'];
    headers.forEach((h,i)=>doc.text(h, colX[i], yPos+2));
    doc.setDrawColor(0,240,255);
    doc.setLineWidth(0.3);
    doc.line(margin-1, yPos+4, W-margin+1, yPos+4);
    yPos += 7;
  };
  
  const checkNewPage = (neededH) => {
    if(yPos + neededH > H - 16) {
      // Footer
      doc.setTextColor(100,100,120);
      doc.setFontSize(6);
      doc.text('Halaman '+pageNum+' - AbsensiKu | '+settings.schoolName, margin, H-6);
      doc.addPage();
      pageNum++;
      addHeader(false);
      addTableHeader();
    }
  };
  
  addHeader(true);
  addTableHeader();
  
  let no = 1;
  let hasPhoto = false;
  const photoRows = []; // kumpulkan foto untuk halaman terpisah
  
  for(const r of filteredRec){
    const s = students.find(x=>x.id===r.studentId);
    const status = r.clockIn ? (isLate(r.clockIn,settings.schoolStart)?'Terlambat':'Tepat Waktu') : '-';
    const rowH = 7;
    
    checkNewPage(rowH + 2);
    
    // Zebra stripe
    if(no%2===0){ doc.setFillColor(15,15,30); doc.rect(margin-1,yPos-3,W-margin*2+2,rowH,'F'); }
    
    doc.setFont('helvetica','normal');
    doc.setFontSize(7);
    doc.setTextColor(220,220,220);
    doc.text(String(no), colX[0], yPos+2);
    doc.text(r.date||'-', colX[1], yPos+2);
    
    const namaLen = r.studentName||'-';
    doc.text(namaLen.length>22?namaLen.slice(0,22)+'...':namaLen, colX[2], yPos+2);
    
    doc.setTextColor(0,240,255);
    doc.text(r.clockIn||'-', colX[3], yPos+2);
    
    if(status==='Terlambat') doc.setTextColor(251,146,60);
    else if(status==='Tepat Waktu') doc.setTextColor(0,255,136);
    else doc.setTextColor(150,150,150);
    doc.text(status, colX[4], yPos+2);
    
    doc.setTextColor(168,85,247);
    doc.text(r.clockOut||'-', colX[5], yPos+2);
    
    doc.setTextColor(180,180,200);
    const kl = (s&&s.kelas||'-');
    doc.text(kl.length>12?kl.slice(0,12)+'..':kl, colX[6], yPos+2);
    
    // Garis pemisah tipis
    doc.setDrawColor(30,30,60);
    doc.setLineWidth(0.1);
    doc.line(margin-1, yPos+4, W-margin+1, yPos+4);
    
    yPos += rowH;
    
    // Kumpulkan foto jika ada
    if(r.clockInPhoto||r.clockOutPhoto){
      photoRows.push({r, s, no});
      hasPhoto = true;
    }
    no++;
  }
  
  // Footer halaman terakhir tabel
  doc.setTextColor(100,100,120);
  doc.setFontSize(6);
  doc.text('Halaman '+pageNum+' - AbsensiKu | '+settings.schoolName, margin, H-6);
  
  // ====== HALAMAN FOTO ======
  if(hasPhoto){
    for(const {r, s, no: rowNo} of photoRows){
      doc.addPage();
      pageNum++;
      
      // Mini header
      doc.setFillColor(10,10,26);
      doc.rect(0,0,W,22,'F');
      doc.setTextColor(0,240,255);
      doc.setFontSize(10);
      doc.setFont('helvetica','bold');
      doc.text('Foto Absensi - '+r.studentName, margin, 10);
      doc.setTextColor(180,180,200);
      doc.setFontSize(7);
      doc.setFont('helvetica','normal');
      doc.text(r.date+' | '+(s&&s.kelas||'-')+' | '+r.studentCode, margin, 16);
      doc.text('Halaman '+pageNum, W-margin-20, 16);
      
      yPos = 28;
      
      const photoW = 85, photoH = 65;
      const positions = [{label:'📷 Foto Masuk', photo:r.clockInPhoto, time:r.clockIn, x:margin},
                         {label:'📷 Foto Pulang', photo:r.clockOutPhoto, time:r.clockOut, x:margin+photoW+8}];
      
      for(const p of positions){
        if(!p.photo) continue;
        doc.setTextColor(0,240,255);
        doc.setFontSize(8);
        doc.text(p.label+' ('+(p.time||'-')+')', p.x, yPos);
        
        try {
          doc.addImage(p.photo, 'JPEG', p.x, yPos+4, photoW, photoH);
        } catch(e) {
          doc.setFillColor(20,20,40);
          doc.rect(p.x, yPos+4, photoW, photoH, 'F');
          doc.setTextColor(100,100,120);
          doc.setFontSize(8);
          doc.text('Foto tidak tersedia', p.x+photoW/2-20, yPos+4+photoH/2);
        }
      }

function applyTheme(themeId) {
  const t = THEMES[themeId]||THEMES['dark-cyan'];
  _currentTheme = themeId;
  localStorage.setItem('absensiTheme', themeId);
  const root = document.documentElement;
  Object.keys(t).forEach(k => { if(k.startsWith('--')) root.style.setProperty(k, t[k]); });
  document.body.style.background = t['--bg-base'];
  // Update theme-color meta
  const meta = document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute('content', t['--bg-base']);
}

// Apply saved theme on load
applyTheme(_currentTheme);

function ParticleBg() {
  const ps = Array.from({length:20},(_,i)=>({id:i,x:Math.random()*100,y:Math.random()*100,sz:Math.random()*3+1,dur:Math.random()*20+10,delay:Math.random()*5,op:Math.random()*.4+.1}));

function Clock({size}) {
  const[now,setNow]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t);},[]);
  const parts=fmtTime(now).split(':');
  if(size==='sm') return h('div',{style:{fontFamily:ORB,color:'var(--accent)',fontSize:'1.125rem',textShadow:'0 0 10px rgba(0,240,255,.5)'}},parts.join(':'));
  return h('div',{style:{textAlign:'center'}},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}},
      parts.map((v,i)=>h(Fragment,{key:i},
        h('div',{style:Object.assign({},gl,{borderRadius:'12px',padding:'12px 16px',border:'1px solid var(--accent-dim)'})},
          h('span',{style:{fontFamily:ORB,fontSize:'2.5rem',fontWeight:'bold',color:'var(--accent)',textShadow:'0 0 10px rgba(0,240,255,.5)'}},v)),
        i<2&&h('span',{key:'sep'+i,style:{fontFamily:ORB,fontSize:'1.875rem',color:'var(--accent-dim)',animation:'pulse-glow 2s ease-in-out infinite'}},':')
      ))
    ),
    h('p',{style:{color:'var(--text-muted)',marginTop:'16px',fontSize:'14px'}},fmtDate(now))
  );
}

function CameraView({action,school,student,onCapture,onClose}) {
  const videoRef=useRef(null); const canvasRef=useRef(null); const streamRef=useRef(null);
  const[ready,setReady]=useState(false); const[flash,setFlash]=useState(false);
  const[countdown,setCountdown]=useState(null); const[timer,setTimer]=useState(0);
  const[facing,setFacing]=useState('user');
  const[gpsStatus,setGpsStatus]=useState('loading');
  const[loc,setLoc]=useState(null); const[dist,setDist]=useState(null);
  const inside=dist!==null&&dist<=school.locationRadius;
  const isIn=action==='in';
  const startCam=useCallback(async f=>{
    try {
      if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());
      const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:f,width:{ideal:1280},height:{ideal:720}},audio:false});
      if(videoRef.current){videoRef.current.srcObject=s;setReady(true);}streamRef.current=s;
    } catch(e) { alert('Kamera tidak tersedia'); onClose(); }
  },[onClose]);
  useEffect(()=>{startCam(facing);return()=>{if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());};},[facing,startCam]);
  useEffect(()=>{

    doGeo();const iv=setInterval(doGeo,10000);return()=>clearInterval(iv);
  },[school.locationLat,school.locationLng]);
  const takePhoto=useCallback(()=>{
    if(!videoRef.current||!canvasRef.current)return;
    const v=videoRef.current,c=canvasRef.current; c.width=v.videoWidth; c.height=v.videoHeight;
    const ctx=c.getContext('2d');
    if(facing==='user'){ctx.translate(c.width,0);ctx.scale(-1,1);}
    ctx.drawImage(v,0,0); ctx.setTransform(1,0,0,1,0,0);
    const bH=100; ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.fillRect(0,c.height-bH,c.width,bH);
    ctx.font='bold 14px Orbitron,monospace'; ctx.fillStyle='#00f0ff'; ctx.textAlign='left';
    ctx.fillText((isIn?'MASUK':'PULANG')+' - '+fmtTime(new Date()),12,c.height-bH+18);
    ctx.font='11px monospace'; ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.fillText(student.name+' ('+student.studentCode+') - '+student.kelas,12,c.height-bH+38);
    if(loc)ctx.fillText('Lokasi: '+(loc.address||fmtCoords(loc)),12,c.height-bH+56);
    if(dist!==null){ctx.fillStyle=inside?'#00ff88':'#ff4444';ctx.font='bold 11px monospace';ctx.fillText((inside?'DALAM':'LUAR')+' Area '+school.locationName+' ('+fmtDist(dist)+')',12,c.height-bH+74);}
    setFlash(true); setTimeout(()=>setFlash(false),300);

    const maxW=640,scale=Math.min(1,maxW/c.width);
    const oc=document.createElement('canvas');oc.width=Math.round(c.width*scale);oc.height=Math.round(c.height*scale);
    oc.getContext('2d').drawImage(c,0,0,oc.width,oc.height);
    const photo=oc.toDataURL('image/jpeg',.45);
    if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());
    onCapture(photo,loc,dist);
  },[action,loc,facing,onCapture,dist,inside,school,student,isIn]);
  const startCD=sec=>{setCountdown(sec);const iv=setInterval(()=>setCountdown(p=>{if(p===null||p<=1){clearInterval(iv);takePhoto();return null;}return p-1;}),1000);};
  const canCapture=ready&&countdown===null&&gpsStatus==='success'&&inside;
  return h('div',{style:{position:'fixed',inset:0,zIndex:50,background:'#000',display:'flex',flexDirection:'column'}},
    h('div',{style:Object.assign({},glS,{position:'absolute',top:0,left:0,right:0,zIndex:20,padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'})},
      h('button',{onClick:()=>{if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());onClose();},style:Object.assign({},gl,{width:'40px',height:'40px',borderRadius:'50%',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',color:'rgba(255,255,255,.7)',cursor:'pointer',fontSize:'16px'})},'\u2715'),
      h('div',{style:{textAlign:'center'}},
        h('span',{style:{fontFamily:ORB,fontSize:'14px',fontWeight:'bold',letterSpacing:'0.2em',color:isIn?'#00f0ff':'#ff8800'}},isIn?'ABSEN MASUK':'ABSEN PULANG'),
        h('p',{style:{color:'var(--text-muted)',fontSize:'9px',fontFamily:MONO}},student.name+' - '+student.kelas)
      ),
      h('button',{onClick:()=>setFacing(f=>f==='user'?'environment':'user'),style:Object.assign({},gl,{width:'40px',height:'40px',borderRadius:'50%',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:'18px'})},'\uD83D\uDD04')

function useIsDesktop(){
  const[d,setD]=React.useState(()=>typeof window!=='undefined'&&window.innerWidth>=768);
  React.useEffect(()=>{
    const fn=()=>setD(window.innerWidth>=768);
    window.addEventListener('resize',fn);
    return()=>window.removeEventListener('resize',fn);
  },[]);
  return d;
}

function AdminDashboard({students,records,settings,leaves}) {
  const todayRecs=records.filter(r=>r.date===todayStr());
  const active=students.filter(s=>s.active);
  const present=todayRecs.filter(r=>r.clockIn).length;
  const late=todayRecs.filter(r=>r.clockIn&&isLate(r.clockIn,settings.schoolStart)).length;
  const pending=leaves.filter(l=>l.status==='pending').length;
  const kelasSet=[...new Set(active.map(s=>s.kelas))].sort();
  const kelasData=kelasSet.map(k=>{const ids=active.filter(s=>s.kelas===k).map(s=>s.id);const p=todayRecs.filter(r=>ids.includes(r.studentId)&&r.clockIn).length;return{kelas:k,total:ids.length,present:p};});
  const weekData=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);const ds=d.toISOString().split('T')[0];const dr=records.filter(r=>r.date===ds);return{day:d.toLocaleDateString('id-ID',{weekday:'short'}),present:dr.filter(r=>r.clockIn).length};});
  const maxP=Math.max(...weekData.map(w=>w.present),1);

// ============================================================
// REKAP KEHADIRAN — nilai persentase + grade
// ============================================================
function calcAttendance(records, settings, holidays) {
  const holidayDates = new Set((holidays||[]).map(h=>h.date));
  const today = new Date(todayStr());
  const year = today.getFullYear();
  const month = today.getMonth();
  let schoolDays = 0, hadir = 0, telat = 0, alpha = 0;
  for(let d=new Date(year,month,1); d<=today; d.setDate(d.getDate()+1)){
    const ds = d.toISOString().split('T')[0];
    if(d.getDay()===0||d.getDay()===6||holidayDates.has(ds)) continue;
    schoolDays++;
    const rec = records.find(r=>r.date===ds);
    if(rec&&rec.clockIn){ hadir++; if(isLate(rec.clockIn,settings.schoolStart)) telat++; }
    else if(ds<todayStr()) alpha++;
  }
  const pct = schoolDays>0?Math.round((hadir/schoolDays)*100):0;
  const grade = pct>=95?'A':pct>=80?'B':pct>=70?'C':pct>=60?'D':'E';
  return {schoolDays,hadir,telat,alpha,pct,grade};
}

// ============================================================
// ADMIN: HALAMAN REKAP STATISTIK BULANAN
// ============================================================
function AdminRekapBulanan({records,students,settings,holidays}) {
  const [selMonth,setSelMonth]=useState(new Date().getMonth());
  const [selYear,setSelYear]=useState(new Date().getFullYear());
  const [selKelas,setSelKelas]=useState('');
  const holidayDates = new Set((holidays||[]).map(h=>h.date));
  const kelasList = [...new Set(students.map(s=>s.kelas))].sort();
  const filtStu = selKelas?students.filter(s=>s.kelas===selKelas):students;

  const getSchoolDaysInMonth = ()=>{
    const days=[];
    const d=new Date(selYear,selMonth,1);
    while(d.getMonth()===selMonth){
      const ds=d.toISOString().split('T')[0];
      if(d.getDay()!==0&&d.getDay()!==6&&!holidayDates.has(ds)) days.push(ds);
      d.setDate(d.getDate()+1);
    }
    return days;
  };

  const schoolDays = getSchoolDaysInMonth();
  const rekap = filtStu.map(s=>{
    const myRec = records.filter(r=>r.studentId===s.id&&r.date.startsWith(selYear+'-'+String(selMonth+1).padStart(2,'0')));
    const hadir=myRec.filter(r=>r.clockIn).length;
    const telat=myRec.filter(r=>r.clockIn&&isLate(r.clockIn,settings.schoolStart)).length;
    const alpha=Math.max(0,schoolDays.length-hadir);
    const pct=schoolDays.length>0?Math.round((hadir/schoolDays.length)*100):0;
    const grade=pct>=95?'A':pct>=80?'B':pct>=70?'C':pct>=60?'D':'E';
    return {s,hadir,telat,alpha,pct,grade};
  }).sort((a,b)=>b.pct-a.pct);

  const avgPct = rekap.length>0?Math.round(rekap.reduce((s,r)=>s+r.pct,0)/rekap.length):0;
  const months=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  const gradeColor = g=>g==='A'?'#00ff88':g==='B'?'#00f0ff':g==='C'?'#ff8800':g==='D'?'#fb923c':'#f87171';

  const exportRekapExcel = ()=>{
    if(!window.XLSX) return;
    const XLSX=window.XLSX;
    const wb=XLSX.utils.book_new();
    kelasList.forEach(kelas=>{
      const kelasRekap=rekap.filter(r=>r.s.kelas===kelas);
      const data=[
        ['No','NIS','Nama','Kelas','Hadir','Telat','Alpha','% Hadir','Grade'],
        ...kelasRekap.map((r,i)=>[i+1,r.s.nis,r.s.name,r.s.kelas,r.hadir,r.telat,r.alpha,r.pct+'%',r.grade])
      ];
      const ws=XLSX.utils.aoa_to_sheet(data);
      ws['!cols']=[{wch:4},{wch:12},{wch:25},{wch:14},{wch:7},{wch:7},{wch:7},{wch:9},{wch:7}];
      XLSX.utils.book_append_sheet(wb,ws,kelas.replace(/[:\/?*[\]]/g,'').slice(0,31));
    });
    XLSX.writeFile(wb,'rekap_'+months[selMonth]+'_'+selYear+'.xlsx');
  };

  return h('div',{className:'afiu',style:{display:'flex',flexDirection:'column',gap:'20px'}},
    h(SectionHeader,{title:'Rekap Bulanan',color1:'#00ff88',color2:'#00f0ff'}),
    h('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap'}},
      h('select',{value:selMonth,onChange:e=>setSelMonth(+e.target.value),style:{padding:'8px 12px',borderRadius:'10px',fontSize:'12px',background:'var(--input-bg)',border:'1px solid var(--accent-dim)',color:'var(--accent)',fontFamily:'JetBrains Mono,monospace'}},
        months.map((m,i)=>h('option',{key:i,value:i},m))),
      h('select',{value:selYear,onChange:e=>setSelYear(+e.target.value),style:{padding:'8px 12px',borderRadius:'10px',fontSize:'12px',background:'var(--input-bg)',border:'1px solid var(--accent-dim)',color:'var(--accent)',fontFamily:'JetBrains Mono,monospace'}},
        [2024,2025,2026,2027].map(y=>h('option',{key:y,value:y},y))),
      h('select',{value:selKelas,onChange:e=>setSelKelas(e.target.value),style:{padding:'8px 12px',borderRadius:'10px',fontSize:'12px',background:'var(--input-bg)',border:'1px solid var(--accent-dim)',color:'var(--accent)',fontFamily:'JetBrains Mono,monospace'}},
        h('option',{value:''},'Semua Kelas'),
        kelasList.map(k=>h('option',{key:k,value:k},k))),
      h('button',{onClick:exportRekapExcel,style:{padding:'8px 14px',borderRadius:'10px',background:'rgba(0,255,136,.1)',border:'1px solid rgba(0,255,136,.3)',color:'#00ff88',fontSize:'10px',fontFamily:'JetBrains Mono,monospace',cursor:'pointer'}},'📊 Excel')
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:'8px'}},
      [{l:'Hari Sekolah',v:schoolDays.length,c:'#00f0ff'},{l:'Rata Hadir',v:avgPct+'%',c:'#00ff88'},{l:'Kelas',v:kelasList.length,c:'#a855f7'},{l:'Siswa',v:filtStu.length,c:'#ff8800'}]
      .map((s,i)=>h('div',{key:i,style:{background:'var(--bg-panel)',backdropFilter:'blur(20px)',borderRadius:'12px',padding:'12px',textAlign:'center',border:'1px solid var(--border)'}},
        h('p',{style:{fontFamily:'Orbitron,monospace',fontSize:'16px',fontWeight:'bold',color:s.c}},s.v),
        h('p',{style:{color:'var(--text-muted)',fontSize:'8px',fontFamily:'JetBrains Mono,monospace',marginTop:'4px'}},s.l)))
    ),
    rekap.length===0?h('p',{style:{textAlign:'center',color:'var(--text-muted)',padding:'32px',fontFamily:'JetBrains Mono,monospace'}},'Tidak ada data'):
    h('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}},
      rekap.map((r,i)=>h('div',{key:r.s.id,style:{background:'var(--bg-panel)',backdropFilter:'blur(20px)',borderRadius:'14px',padding:'14px',border:'1px solid var(--border)',display:'flex',alignItems:'center',gap:'12px'}},
        h('div',{style:{width:'28px',textAlign:'center',fontFamily:'JetBrains Mono,monospace',fontSize:'11px',color:'var(--text-muted)'}},i+1),
        h('div',{style:{width:'36px',height:'36px',borderRadius:'10px',background:'var(--input-bg)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Orbitron,monospace',fontSize:'13px',color:'var(--accent)',border:'1px solid rgba(0,240,255,.15)'}},r.s.name.charAt(0)),
        h('div',{style:{flex:1,minWidth:0}},
          h('p',{style:{color:'var(--text-secondary)',fontSize:'13px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},r.s.name),
          h('p',{style:{color:'var(--text-muted)',fontSize:'9px',fontFamily:'JetBrains Mono,monospace'}},r.s.kelas+' | Hadir:'+r.hadir+' Telat:'+r.telat+' Alpha:'+r.alpha),
          h('div',{style:{marginTop:'6px',height:'4px',borderRadius:'999px',background:'rgba(255,255,255,.05)',overflow:'hidden'}},
            h('div',{style:{height:'100%',borderRadius:'999px',background:gradeColor(r.grade),width:r.pct+'%',transition:'width .5s'}}))
        ),
        h('div',{style:{textAlign:'right',minWidth:'48px'}},
          h('p',{style:{fontFamily:'Orbitron,monospace',fontSize:'16px',fontWeight:'bold',color:gradeColor(r.grade)}},r.grade),
          h('p',{style:{color:'var(--text-muted)',fontSize:'9px',fontFamily:'JetBrains Mono,monospace'}},r.pct+'%')
        )
      ))
    )
  );
}

function AdminBackup({students,records,leaves,announcements,settings}) {
  const [restoring,setRestoring]=useState(false);
  const backup=()=>{
    const data={version:'AbsensiKu-v2',exportedAt:new Date().toISOString(),settings,students,records,leaves,announcements};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='backup_absensiKu_'+todayStr()+'.json';a.click();
  };
  const restore=async(e)=>{
    const file=e.target.files[0]; if(!file)return;
    setRestoring(true);
    const text=await file.text();
    try{
      const data=JSON.parse(text);
      if(!data.version||!data.version.startsWith('AbsensiKu')){alert('File backup tidak valid');setRestoring(false);return;}
      if(!confirm('PERHATIAN: Data saat ini akan ditimpa dengan backup ini. Lanjutkan?')){setRestoring(false);return;}
      // Restore settings
      if(data.settings) await DB.saveSettings(data.settings);
      // Restore students
      for(const s of (data.students||[])) await DB.saveStudent(s);
      // Restore records
      for(const r of (data.records||[])) await DB.upsertRecord(r);
      await DB.addLog('Admin','Restore Backup',file.name);
      alert('Restore berhasil! Silakan refresh halaman.');
    }catch(err){alert('Gagal restore: '+err.message);}
    setRestoring(false); e.target.value='';
  };
  return h('div',{className:'afiu',style:{display:'flex',flexDirection:'column',gap:'16px'}},
    h(SectionHeader,{title:'Backup & Restore',color1:'#a855f7'}),
    h('div',{style:{background:'var(--bg-panel)',backdropFilter:'blur(20px)',borderRadius:'16px',padding:'24px',border:'1px solid rgba(168,85,247,.15)',display:'flex',flexDirection:'column',gap:'16px'}},
      h('div',{style:{textAlign:'center',padding:'16px'}},
        h('div',{style:{fontSize:'48px',marginBottom:'12px'}},'💾'),
        h('p',{style:{color:'var(--text-secondary)',fontSize:'13px'}},students.length+' Siswa · '+records.length+' Absensi'),
        h('p',{style:{color:'var(--text-muted)',fontSize:'10px',fontFamily:'JetBrains Mono,monospace',marginTop:'4px'}},'Backup terakhir: '+todayStr())
      ),
      h('button',{onClick:backup,style:{width:'100%',padding:'14px',borderRadius:'14px',background:'rgba(168,85,247,.15)',border:'1px solid rgba(168,85,247,.4)',color:'#a855f7',fontFamily:'Orbitron,monospace',fontSize:'12px',fontWeight:'600',letterSpacing:'0.15em',cursor:'pointer'}},'⬇ DOWNLOAD BACKUP'),
      h('label',{style:{display:'block',width:'100%',padding:'14px',borderRadius:'14px',background:'rgba(255,136,0,.1)',border:'1px solid rgba(255,136,0,.3)',color:'#ff8800',fontFamily:'Orbitron,monospace',fontSize:'12px',fontWeight:'600',letterSpacing:'0.15em',cursor:'pointer',textAlign:'center'}},
        restoring?'Memulihkan...':'⬆ RESTORE BACKUP',
        h('input',{type:'file',accept:'.json',style:{display:'none'},onChange:restore,disabled:restoring})
      )
    ),
    h('div',{style:{background:'rgba(239,68,68,.05)',borderRadius:'12px',padding:'16px',border:'1px solid rgba(239,68,68,.15)'}},
      h('p',{style:{color:'rgba(248,113,113,.6)',fontSize:'11px',fontFamily:'JetBrains Mono,monospace',lineHeight:'1.6'}},'⚠ Backup mencakup: data siswa, absensi, izin, pengumuman, dan pengaturan. Lakukan backup rutin setiap bulan.')
    )
  );
}

// FONNTE API — Kirim WA Otomatis
// ============================================================
const fonnteKirim = async (token, target, message, device='') => {
  const body = new FormData();
  body.append('target', target);
  body.append('message', message);
  if(device) body.append('device', device);
  const res = await fetch('https://api.fonnte.com/send', {
    method: 'POST',
    headers: { 'Authorization': token },
    body
  });
  const json = await res.json();
  return json; // {status:true/false, reason:string, id:string}
};

const fonnteKirimBulk = async (token, targets, message, device='', onProgress) => {
  const results = [];
  for(let i=0; i<targets.length; i++) {
    const t = targets[i];
    try {
      const res = await fonnteKirim(token, t.phone, message.replace('{nama}',t.name).replace('{kelas}',t.kelas||'-').replace('{nis}',t.nis||'-'), device);
      results.push({...t, success:res.status, reason:res.reason||''});
    } catch(e) {
      results.push({...t, success:false, reason:e.message});
    }
    if(onProgress) onProgress(i+1, targets.length);
    await new Promise(r=>setTimeout(r,700)); // delay antar pesan
  }
  return results;
};

// ADMIN: KIRIM WA (Fonnte)
// ============================================================
function AdminWA({students, records, settings, onReload}) {
  const [tab, setTab] = React.useState('alpha'); // alpha | terlambat | laporan | pengumuman
  const [selIds, setSelIds] = React.useState(new Set());
  const [msg, setMsg] = React.useState('');
  const [sending, setSending] = React.useState(false);
  const [progress, setProgress] = React.useState(null); // {done, total}
  const [results, setResults] = React.useState(null);
  const [filterKelas, setFilterKelas] = React.useState('');

  const token = settings.fonnteToken||'';
  const device = settings.fonnteDevice||'';
  const today = todayStr();
  const todayRec = records.filter(r=>r.date===today);
  const absenIds = new Set(todayRec.filter(r=>r.clockIn).map(r=>r.studentId));
  const terlambatIds = new Set(todayRec.filter(r=>r.clockIn&&isLate(r.clockIn,settings.schoolStart)).map(r=>r.studentId));
  const kelasSet = [...new Set(students.map(s=>s.kelas))].sort();

  const getTargets = () => {
    let pool = students.filter(s=>s.active&&s.phone);
    if(filterKelas) pool = pool.filter(s=>s.kelas===filterKelas);
    if(tab==='alpha') pool = pool.filter(s=>!absenIds.has(s.id));
    if(tab==='terlambat') pool = pool.filter(s=>terlambatIds.has(s.id));
    return pool.filter(s=>selIds.has(s.id));
  };

  const getAllPool = () => {
    let pool = students.filter(s=>s.active&&s.phone);
    if(filterKelas) pool = pool.filter(s=>s.kelas===filterKelas);
    if(tab==='alpha') return pool.filter(s=>!absenIds.has(s.id));
    if(tab==='terlambat') return pool.filter(s=>terlambatIds.has(s.id));
    return pool;
  };

  const toggleAll = () => {
    const pool = getAllPool();
    const allSelected = pool.every(s=>selIds.has(s.id));
    if(allSelected) setSelIds(new Set());
    else setSelIds(new Set(pool.map(s=>s.id)));
  };

  const toggleSel = id => {
    const next = new Set(selIds);
    next.has(id)?next.delete(id):next.add(id);
    setSelIds(next);
  };

  // Default pesan per tab
  React.useEffect(()=>{
    const nl='\n';
    if(tab==='alpha') setMsg('*'+settings.schoolName+'*'+nl+nl+'Yth. Orang Tua/Wali {nama} ({kelas})'+nl+nl+'Kami mencatat putra/putri Anda *belum hadir* hari ini ('+today+').'+nl+'Mohon konfirmasi atau hubungi sekolah.'+nl+nl+'_AbsensiKu - Sistem Absensi Digital_');
    else if(tab==='terlambat') setMsg('*'+settings.schoolName+'*'+nl+nl+'Yth. Orang Tua/Wali {nama} ({kelas})'+nl+nl+'Kami mencatat putra/putri Anda *datang terlambat* hari ini ('+today+').'+nl+'Mohon berikan perhatian agar tidak terulang.'+nl+nl+'_AbsensiKu - Sistem Absensi Digital_');
    else if(tab==='laporan') setMsg('*'+settings.schoolName+'*'+nl+nl+'Yth. Orang Tua/Wali {nama} ({kelas})'+nl+nl+'Rekap kehadiran hari ini ('+today+'):'+nl+'NIS: {nis}'+nl+nl+'Terima kasih atas perhatian Anda.'+nl+nl+'_AbsensiKu - Sistem Absensi Digital_');
    else if(tab==='pengumuman') setMsg('*'+settings.schoolName+'*'+nl+nl+'Kepada Yth. Siswa/i dan Orang Tua'+nl+nl+'[Isi pengumuman di sini]'+nl+nl+'_AbsensiKu - Sistem Absensi Digital_');
    setSelIds(new Set());
    setResults(null);
  },[tab]);

  const handleKirim = async () => {
    if(!token){alert('Token Fonnte belum diisi. Isi dulu di menu Pengaturan.');return;}
    const targets = getTargets().map(s=>({...s,phone:(s.phone||'').replace(/[^0-9]/g,'').replace(/^0/,'62')})).filter(s=>s.phone.length>=10);
    if(targets.length===0){alert('Tidak ada penerima dipilih atau nomor HP tidak valid.');return;}
    if(!msg.trim()){alert('Pesan tidak boleh kosong.');return;}
    if(!confirm('Kirim WA ke '+targets.length+' penerima via Fonnte?'))return;
    setSending(true); setProgress({done:0,total:targets.length}); setResults(null);
    const res = await fonnteKirimBulk(token, targets, msg, device, (done,total)=>setProgress({done,total}));
    setSending(false); setResults(res);
    const ok=res.filter(r=>r.success).length;
    await DB.addLog('Admin','Kirim WA Fonnte',ok+'/'+targets.length+' berhasil - tab: '+tab);
  };

  const tabs = [
    {id:'alpha',label:'Alpha',icon:'⚠️'},
    {id:'terlambat',label:'Terlambat',icon:'🕐'},
    {id:'laporan',label:'Laporan',icon:'📋'},
    {id:'pengumuman',label:'Pengumuman',icon:'📢'},
  ];

  const pool = getAllPool();
  const targets = getTargets();

  return h('div',{className:'afiu',style:{display:'flex',flexDirection:'column',gap:'16px'}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},

      !token&&h('span',{style:{fontSize:'9px',fontFamily:MONO,color:'#f87171',background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',padding:'4px 10px',borderRadius:'8px'}},'Token belum diisi')
    ),

    // Tab
    h('div',{style:{display:'flex',borderRadius:'12px',border:'1px solid var(--border)',overflow:'hidden'}},
      tabs.map(t=>h('button',{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,padding:'10px 4px',background:tab===t.id?'rgba(0,240,255,.1)':'none',border:'none',color:tab===t.id?'#00f0ff':'rgba(255,255,255,.3)',fontFamily:MONO,fontSize:'9px',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'3px'}},
        h('span',{style:{fontSize:'16px'}},t.icon),t.label
      ))
    ),

    // Filter kelas
    h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap'}},
      h('button',{onClick:()=>setFilterKelas(''),style:{padding:'4px 10px',borderRadius:'8px',fontSize:'9px',fontFamily:MONO,cursor:'pointer',border:'1px solid',background:filterKelas===''?'rgba(0,240,255,.15)':'transparent',color:filterKelas===''?'#00f0ff':'rgba(255,255,255,.3)',borderColor:filterKelas===''?'rgba(0,240,255,.4)':'rgba(255,255,255,.1)'}},'Semua'),
      kelasSet.map(k=>h('button',{key:k,onClick:()=>setFilterKelas(k),style:{padding:'4px 10px',borderRadius:'8px',fontSize:'9px',fontFamily:MONO,cursor:'pointer',border:'1px solid',background:filterKelas===k?'rgba(0,240,255,.15)':'transparent',color:filterKelas===k?'#00f0ff':'rgba(255,255,255,.3)',borderColor:filterKelas===k?'rgba(0,240,255,.4)':'rgba(255,255,255,.1)'}},k))
    ),

    // Daftar penerima
    h('div',{style:{background:'rgba(15,15,26,.6)',borderRadius:'16px',border:'1px solid rgba(255,255,255,.06)',overflow:'hidden'}},

        h('button',{onClick:toggleAll,style:{fontSize:'9px',fontFamily:MONO,background:'none',border:'1px solid var(--border)',borderRadius:'8px',color:'var(--text-muted)',padding:'4px 10px',cursor:'pointer'}},

const kirimWABulkAlpha = (students, records, settings) => {
  const today = todayStr();
  const absenHariIni = records.filter(r=>r.date===today&&r.clockIn);
  const absenIds = new Set(absenHariIni.map(r=>r.studentId));
  const alphaToday = students.filter(s=>s.active&&!absenIds.has(s.id)&&s.phone);
  if(alphaToday.length===0){alert('Tidak ada siswa alpha hari ini atau tidak ada yang punya nomor HP.');return;}

    const key=now.getFullYear()+'-'+String(i+1).padStart(2,'0');
    const mRecs=myRecs.filter(r=>r.date.startsWith(key));
    const hadir=mRecs.filter(r=>r.clockIn).length;
    return {m,hadir,total:mRecs.length};
  }).filter(x=>x.total>0||x.hadir>0);

// ============================================================
// ADMIN: QR CODE SCANNER
// ============================================================
function AdminQRScanner({students, records, settings, onReload}) {
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const intervalRef = useRef(null);
  const [scanning, setScanning] = useState(false);
  const [result, setResult] = useState(null); // {student, record, status}
  const [error, setError] = useState(null);
  const [manualCode, setManualCode] = useState('');
  const [mode, setMode] = useState('in'); // 'in' atau 'out'

  const stopCamera = () => {
    if(intervalRef.current) clearInterval(intervalRef.current);
    if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop());
    streamRef.current = null;
    setScanning(false);
  };

  const startCamera = async () => {
    setError(null); setResult(null);
    try {
      const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
      streamRef.current = stream;
      if(videoRef.current) { videoRef.current.srcObject=stream; videoRef.current.play(); }
      setScanning(true);
      // Scan setiap 500ms pakai jsQR jika tersedia, kalau tidak pakai manual
      intervalRef.current = setInterval(()=>{ tryScan(); }, 500);
    } catch(e) { setError('Kamera tidak bisa diakses: '+e.message); }
  };

  const tryScan = () => {
    if(!videoRef.current||!canvasRef.current) return;
    const v=videoRef.current; const c=canvasRef.current;
    if(v.readyState!==v.HAVE_ENOUGH_DATA) return;
    c.width=v.videoWidth; c.height=v.videoHeight;
    const ctx=c.getContext('2d');
    ctx.drawImage(v,0,0,c.width,c.height);
    const imgData=ctx.getImageData(0,0,c.width,c.height);
    // Gunakan jsQR jika tersedia
    if(window.jsQR) {
      const code=window.jsQR(imgData.data,imgData.width,imgData.height,{inversionAttempts:'dontInvert'});
      if(code&&code.data) { stopCamera(); processQR(code.data); }
    }
  };

  const processQR = (data) => {
    const parts = data.split('|');
    const studentCode = parts[0];
    const studentId = parts[1];
    const student = students.find(s=>s.studentCode===studentCode||s.id===studentId);
    if(!student) { setError('Siswa tidak ditemukan: '+studentCode); return; }
    processAbsen(student);
  };

  const processAbsen = async (student) => {
    const today = new Date().toISOString().split('T')[0];
    const now = new Date();
    const time = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    const existing = records.find(r=>r.studentId===student.id&&r.date===today);

    if(mode==='in' && existing?.clockIn) {
      setResult({student, time, msg:'Sudah absen masuk jam '+existing.clockIn, type:'warn', existing});
      return;
    }
    if(mode==='out' && !existing?.clockIn) {
      setResult({student, time, msg:'Belum absen masuk hari ini!', type:'error', existing});
      return;
    }
    if(mode==='out' && existing?.clockOut) {
      setResult({student, time, msg:'Sudah absen pulang jam '+existing.clockOut, type:'warn', existing});
      return;
    }

    // Hitung status
    let clockInStatus=null, clockOutStatus=null;
    if(mode==='in') {
      const [sh,sm]=(settings.schoolStart||'07:00').split(':').map(Number);
      const [h,m]=time.split(':').map(Number);
      const diff=(h*60+m)-(sh*60+sm);
      clockInStatus=diff<-15?'cepat':diff>0?'terlambat':'tepat';
    } else {
      const [eh,em]=(settings.schoolEnd||'15:00').split(':').map(Number);
      const [h,m]=time.split(':').map(Number);
      const diff=(h*60+m)-(eh*60+em);
      clockOutStatus=diff<-15?'cepat':diff>30?'lembur':'tepat';
    }

    const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
    let rec;
    if(mode==='in') {
      rec=existing
        ?Object.assign({},existing,{clockIn:time,clockInStatus,deviceId:'QR-Admin'})
        :{id:uid(),studentId:student.id,studentName:student.name,studentCode:student.studentCode,date:today,clockIn:time,clockInStatus,clockInPhoto:null,clockInLocation:null,clockInDistance:null,deviceId:'QR-Admin'};
    } else {
      rec=Object.assign({},existing,{clockOut:time,clockOutStatus,deviceId:'QR-Admin'});
    }

    await DB.upsertRecord(rec);
    await DB.addLog('Admin QR',mode==='in'?'Scan Masuk':'Scan Pulang',student.name+' - '+time);
    await onReload();
    setResult({student,time,type:'success',msg:(mode==='in'?'Absen Masuk':'Absen Pulang')+' berhasil!',status:mode==='in'?clockInStatus:clockOutStatus});
  };

  const handleManual = () => {
    if(!manualCode.trim()){return;}
    const student=students.find(s=>s.studentCode===manualCode.trim().toUpperCase()||s.studentCode===manualCode.trim());
    if(!student){setError('Kode siswa tidak ditemukan: '+manualCode);return;}
    setManualCode('');
    processAbsen(student);
  };

  useEffect(()=>()=>stopCamera(),[]);

  const statusColor = result?.type==='success'?'#00ff88':result?.type==='warn'?'#fbbf24':'#f87171';

  return h('div',{className:'afiu',style:{display:'flex',flexDirection:'column',gap:'16px'}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('p',{style:{fontFamily:ORB,fontSize:'12px',color:'var(--text-secondary)',letterSpacing:'0.1em',textTransform:'uppercase'}},'Scan QR Absensi'),
      // Toggle mode in/out
      h('div',{style:{display:'flex',borderRadius:'10px',border:'1px solid var(--border)',overflow:'hidden'}},
        ['in','out'].map(m=>h('button',{key:m,onClick:()=>{setMode(m);setResult(null);setError(null);},style:{padding:'6px 16px',background:mode===m?'rgba(0,240,255,.15)':'none',border:'none',color:mode===m?'#00f0ff':'rgba(255,255,255,.3)',fontFamily:MONO,fontSize:'11px',cursor:'pointer',fontWeight:mode===m?'bold':'normal'}},m==='in'?'Masuk':'Pulang'))
      )
    ),

    // Hasil scan
    result&&h('div',{style:{background:'var(--bg-panel-s)',border:'1px solid '+statusColor,borderRadius:'16px',padding:'20px'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'12px'}},
        h('div',{style:{width:'48px',height:'48px',borderRadius:'50%',background:'var(--accent-bg)',border:'2px solid rgba(0,240,255,.3)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:ORB,fontSize:'20px',fontWeight:'bold',color:'var(--accent)'}},
          result.student.name.charAt(0)
        ),
        h('div',null,
          h('p',{style:{fontFamily:ORB,fontSize:'14px',fontWeight:'bold',color:'var(--text-primary)'}},(result.student||{}).name),
          h('p',{style:{fontFamily:MONO,fontSize:'10px',color:'var(--text-muted)'}},(result.student||{}).kelas+' · '+(result.student||{}).studentCode)
        )
      ),
      h('div',{style:{background:'rgba(0,0,0,.3)',borderRadius:'10px',padding:'12px',marginBottom:'12px'}},
        h('p',{style:{color:statusColor,fontFamily:MONO,fontSize:'12px',fontWeight:'bold',marginBottom:'4px'}},result.msg),
        result.time&&h('p',{style:{color:'var(--text-muted)',fontFamily:MONO,fontSize:'11px'}},'Jam: '+result.time+(result.status?' · '+(result.status==='cepat'?mode==='in'?'Cepat Datang':'Cepat Pulang':result.status==='lembur'?'Lembur':result.status==='terlambat'?'Terlambat':'Tepat Waktu'):''))
      ),
      h('button',{onClick:()=>{setResult(null);setError(null);},style:{width:'100%',padding:'12px',borderRadius:'10px',background:'var(--accent-bg)',border:'1px solid rgba(0,240,255,.3)',color:'var(--accent)',fontFamily:MONO,fontSize:'11px',cursor:'pointer'}},'Scan Berikutnya')

// MEDIA — Upload & Tampil Gambar/Audio/Video di Soal CBT
// Menggunakan Supabase Storage (bucket: cbt-media)

//        Policy: allow all (public) atau sesuaikan kebutuhan

// Kompres gambar sebelum upload (canvas resize + quality reduction)
async function compressImage(file, maxW=1280, quality=0.75) {
  return new Promise((res)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let {width:w, height:h}=img;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      const cv=document.createElement('canvas');
      cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cv.toBlob(blob=>res(new File([blob],file.name,{type:'image/jpeg'})),'image/jpeg',quality);
    };
    img.src=url;
  });
}

// Upload file ke Supabase Storage, return public URL
// Gambar otomatis dikompres, audio/video diupload langsung
async function uploadToStorage(file, folder='questions') {
  let uploadFile = file;
  // Kompres gambar otomatis
  if(file.type.startsWith('image/') && file.size > 100*1024) {
    try { uploadFile = await compressImage(file); } catch(e) { uploadFile = file; }
  }
  const ext = uploadFile.name.split('.').pop().toLowerCase()||'jpg';
  const fname = folder+'/'+Date.now()+'-'+Math.random().toString(36).slice(2,8)+'.'+ext;
  const res = await fetch(
    SUPABASE_URL+'/storage/v1/object/cbt-media/'+fname,
    { method:'POST', headers:{'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':uploadFile.type,'x-upsert':'true'}, body:uploadFile }
  );
  if(!res.ok){ const e=await res.json().catch(()=>({message:'Upload gagal'})); throw new Error(e.error||e.message||'Upload gagal'); }
  const origMB=(file.size/1024/1024).toFixed(1);
  const newMB=(uploadFile.size/1024/1024).toFixed(1);
  console.log(`Upload: ${file.name} ${origMB}MB → ${newMB}MB`);
  return SUPABASE_URL+'/storage/v1/object/public/cbt-media/'+fname;
}

// Hapus file dari Supabase Storage (opsional cleanup)
async function deleteFromStorage(url) {
  const path = url.split('/cbt-media/')[1];
  if(!path) return;
  await fetch(SUPABASE_URL+'/storage/v1/object/cbt-media/'+path,
    { method:'DELETE', headers:{'Authorization':'Bearer '+SUPABASE_ANON_KEY} });
}

// Deteksi tipe media dari data URL / mime
function getMediaKind(url) {
  if(!url) return null;
  if(url.startsWith('data:image')||/\.(jpg|jpeg|png|gif|webp|svg)$/i.test(url)) return 'image';
  if(url.startsWith('data:audio')||/\.(mp3|wav|ogg|m4a)$/i.test(url)) return 'audio';
  if(url.startsWith('data:video')||/\.(mp4|webm|mov|avi)$/i.test(url)) return 'video';
  return 'image';
}

// ── Performance & Reliability Helpers ─────────────────────────────
// Retry dengan exponential backoff — untuk toleransi network spike
async function withRetry(fn, maxRetries=3, baseDelay=1000) {
  let lastErr;
  for(let i=0;i<maxRetries;i++){
    try{ return await fn(); }
    catch(e){
      lastErr=e;
      if(i<maxRetries-1){
        // Exponential backoff + jitter
        const delay=baseDelay*Math.pow(2,i)+Math.random()*500;
        await new Promise(r=>setTimeout(r,delay));
      }
    }
  }
  throw lastErr;
}

// Queue submit — jika gagal, simpan lokal dan retry background
const submitQueue=[];
let submitRunning=false;
async function queueSubmit(sessionData) {
  submitQueue.push(sessionData);
  if(submitRunning) return;
  submitRunning=true;
  while(submitQueue.length>0){
    const s=submitQueue[0];
    try{
      await withRetry(()=>DB.saveCbtSession(s),4,800);
      submitQueue.shift();
    }catch(e){
      // Simpan ke localStorage sebagai fallback
      try{
        const key='cbt_pending_'+s.id;
        localStorage.setItem(key,JSON.stringify({...s,_pendingAt:Date.now()}));
        console.warn('Submit disimpan lokal, akan retry saat online');
      }catch(le){}
      submitQueue.shift();
    }
    await new Promise(r=>setTimeout(r,200));// jeda kecil antar submit
  }
  submitRunning=false;
}

// Cek dan re-submit data pending dari localStorage
async function resubmitPending() {
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('cbt_pending_'));
  for(const key of keys){
    try{
      const s=JSON.parse(localStorage.getItem(key));
      await withRetry(()=>DB.saveCbtSession(s),3,1000);
      localStorage.removeItem(key);
      console.log('Re-submit sukses:', key);
    }catch(e){ /* biarkan, coba lagi nanti */ }
  }
}

// ── Modal Kelola Soal ──────────────────────────────────────────────
function CbtQuestionsModal({exam,onClose}) {
  const [questions,setQuestions]=useState([]);
  const [loading,setLoading]=useState(true);
  const [editQ,setEditQ]=useState(null);
  const [importText,setImportText]=useState('');
  const [showImport,setShowImport]=useState(false);

  const reload=async()=>{
    setLoading(true);
    const q=await DB.getCbtQuestions(exam.id);
    setQuestions(q);setLoading(false);
  };
  useEffect(()=>{reload();},[]);

  const newQ=()=>setEditQ({id:genId(),exam_id:exam.id,type:'pg',question:'',options:['','','','',''],correct_answer:'A',score:1,order_num:questions.length+1});

  const handleImport=async()=>{
    // Format: nomor. pertanyaan|A.opt|B.opt|C.opt|D.opt|JAWABAN
    const lines=importText.trim().split('\n').filter(l=>l.trim());
    const qs=lines.map((line,i)=>{
      const parts=line.split('|');
      const q=parts[0].replace(/^\d+\.\s*/,'').trim();
      const opts=parts.slice(1,5).map(o=>o.replace(/^[A-D]\./,'').trim());
      const ans=(parts[5]||'A').trim().toUpperCase();
      return {id:genId(),exam_id:exam.id,type:'pg',question:q,options:opts,correct_answer:ans,score:1,order_num:i+1};
    });
    if(qs.length){await DB.saveCbtQuestionsBulk(qs);reload();setShowImport(false);setImportText('');}
  };

  const inSt={width:'100%',padding:'9px 12px',borderRadius:'10px',background:'var(--input-bg)',border:'1px solid var(--border)',color:'var(--text-primary)',fontFamily:MONO,fontSize:'11px',boxSizing:'border-box'};

  return h('div',{onClick:onClose,style:{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,.75)',backdropFilter:'blur(6px)',display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'16px',overflowY:'auto'}},
    h('div',{onClick:e=>e.stopPropagation(),style:{width:'min(640px,100%)',background:'var(--bg-panel-s)',borderRadius:'20px',border:'1px solid var(--accent-dim)',padding:'24px',display:'flex',flexDirection:'column',gap:'16px',marginTop:'8px',marginBottom:'32px'}},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'8px'}},
        h('div',null,
          h('h3',{style:{fontFamily:ORB,color:'var(--accent)',fontSize:'13px',letterSpacing:'.07em'}},'📝 Soal: '+exam.title),
          h('p',{style:{fontSize:'9px',fontFamily:MONO,color:'var(--text-muted)',marginTop:'2px'}},questions.length+' soal terdaftar')
        ),
        h('div',{style:{display:'flex',gap:'8px'}},
          h('button',{onClick:()=>setShowImport(!showImport),style:{padding:'7px 12px',borderRadius:'8px',border:'1px solid var(--border)',background:'transparent',color:'var(--text-secondary)',cursor:'pointer',fontFamily:MONO,fontSize:'10px'}},'📥 Import'),
          h('button',{onClick:newQ,style:{padding:'7px 12px',borderRadius:'8px',border:'1px solid var(--accent-dim)',background:'var(--accent-bg)',color:'var(--accent)',cursor:'pointer',fontFamily:MONO,fontSize:'10px'}},'+Soal'),
          h('button',{onClick:onClose,style:{padding:'7px 12px',borderRadius:'8px',border:'1px solid var(--border)',background:'transparent',color:'var(--text-muted)',cursor:'pointer',fontFamily:MONO,fontSize:'10px'}},'✕ Tutup')
        )
      ),

      showImport&&h('div',{style:{padding:'14px',borderRadius:'12px',background:'rgba(0,240,255,.04)',border:'1px solid rgba(0,240,255,.15)'}},
        h('p',{style:{fontFamily:MONO,fontSize:'9px',color:'var(--text-muted)',marginBottom:'6px',lineHeight:'1.6'}},'Format per baris: 1. Pertanyaan|A.Opsi A|B.Opsi B|C.Opsi C|D.Opsi D|JAWABAN'),
        h('textarea',{value:importText,onChange:e=>setImportText(e.target.value),rows:5,placeholder:'1. Ibukota Indonesia adalah?|A.Bandung|B.Jakarta|C.Surabaya|D.Medan|B',style:{...inSt,resize:'vertical'}}),
        h('button',{onClick:handleImport,disabled:!importText.trim(),style:{marginTop:'8px',padding:'8px 16px',borderRadius:'8px',border:'1px solid var(--accent-dim)',background:'var(--accent-bg)',color:'var(--accent)',cursor:'pointer',fontFamily:MONO,fontSize:'10px',opacity:!importText.trim()?0.4:1}},'Import Soal')
      ),

      loading?h(LoadingScreen,{msg:'Memuat soal...'}):
      questions.length===0?h('p',{style:{textAlign:'center',color:'var(--text-muted)',fontFamily:MONO,fontSize:'11px',padding:'24px'}},'Belum ada soal. Klik "+Soal" untuk menambah.'):
      h('div',{style:{display:'flex',flexDirection:'column',gap:'8px',maxHeight:'400px',overflowY:'auto'}},
        questions.map((q,qi)=>h('div',{key:q.id,style:{padding:'12px',borderRadius:'12px',background:'var(--bg-card)',border:'1px solid var(--border)'}},
          h('div',{style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'8px'}},
            h('p',{style:{fontFamily:MONO,fontSize:'11px',color:'var(--text-secondary)',flex:1,lineHeight:'1.5'}},
              h('span',{style:{color:'var(--accent)',fontWeight:'bold',marginRight:'6px'}},(qi+1)+'.'),
              q.media_url&&h('span',{style:{fontSize:'9px',padding:'1px 5px',borderRadius:'4px',background:'rgba(0,240,255,.08)',color:'#00f0ff',marginRight:'4px',fontFamily:MONO}},{image:'🖼',audio:'🎵',video:'🎬'}[getMediaKind(q.media_url)]||'📎'),
              h('span',{style:{background:q.type==='essay'?'rgba(168,85,247,.15)':q.type==='mcma'?'rgba(251,146,60,.15)':q.type==='tf'?'rgba(250,204,21,.15)':'rgba(0,240,255,.1)',color:q.type==='essay'?'#a855f7':q.type==='mcma'?'#fb923c':q.type==='tf'?'#facc15':'#00f0ff',fontSize:'8px',padding:'1px 6px',borderRadius:'4px',marginRight:'6px',fontFamily:MONO}},{essay:'ESSAY',mcma:'MCMA',tf:'B/S',pg:'PG'}[q.type]||q.type),
              q.question
            ),
            h('div',{style:{display:'flex',gap:'4px'}},
              h('button',{onClick:()=>setEditQ({...q}),style:{padding:'4px 8px',borderRadius:'6px',border:'1px solid var(--border)',background:'transparent',color:'var(--text-muted)',cursor:'pointer',fontSize:'10px'}},'✏️'),
              h('button',{onClick:async()=>{await DB.deleteCbtQuestion(q.id);reload();},style:{padding:'4px 8px',borderRadius:'6px',border:'1px solid rgba(239,68,68,.2)',background:'rgba(239,68,68,.05)',color:'#f87171',cursor:'pointer',fontSize:'10px'}},'🗑')
            )
          ),
          (q.type==='pg'||q.type==='mcma')&&h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px',marginTop:'6px'}},
            ['A','B','C','D','E'].map((ltr,i)=>h('span',{key:ltr,style:{fontSize:'9px',fontFamily:MONO,
              color:(Array.isArray(q.correct_answer)?q.correct_answer.includes(ltr):q.correct_answer===ltr)?'#00ff88':'var(--text-dim)',
              background:(Array.isArray(q.correct_answer)?q.correct_answer.includes(ltr):q.correct_answer===ltr)?'rgba(0,255,136,.1)':'transparent',
              padding:'2px 6px',borderRadius:'4px',border:'1px solid '+((Array.isArray(q.correct_answer)?q.correct_answer.includes(ltr):q.correct_answer===ltr)?'rgba(0,255,136,.2)':'transparent')}},
              ltr+'. '+(q.options&&q.options[i]?q.options[i]:'—')
            ))
          )
        ))
      ),

      editQ&&h(CbtQuestionEditor,{q:editQ,onClose:()=>setEditQ(null),onSave:async q=>{await DB.saveCbtQuestion(q);setEditQ(null);reload();},allowEssay:exam.allow_essay})
    )
  );
}

// ── Editor Soal ────────────────────────────────────────────────────
function CbtQuestionEditor({q,onClose,onSave,allowEssay}) {
  const [f,setF]=useState({...q,options:[...(q.options||['','','',''])],option_media:[...(q.option_media||[])]});
  const updOptMedia=(i,v)=>setF(p=>{const om=[...(p.option_media||[])];om[i]=v;return{...p,option_media:om};});
  const upd=k=>v=>setF(p=>({...p,[k]:v}));
  const updOpt=(i,v)=>setF(p=>{const o=[...p.options];o[i]=v;return{...p,options:o};});
  const inSt={width:'100%',padding:'9px 12px',borderRadius:'10px',background:'var(--input-bg)',border:'1px solid var(--border)',color:'var(--text-primary)',fontFamily:MONO,fontSize:'11px',boxSizing:'border-box'};

  return h('div',{onClick:onClose,style:{position:'fixed',inset:0,zIndex:300,background:'rgba(0,0,0,.8)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}},
    h('div',{onClick:e=>e.stopPropagation(),style:{width:'min(480px,100%)',background:'var(--bg-panel-s)',borderRadius:'18px',border:'1px solid var(--accent-dim)',padding:'20px',display:'flex',flexDirection:'column',gap:'12px',maxHeight:'90vh',overflowY:'auto'}},
      h('h4',{style:{fontFamily:ORB,color:'var(--accent)',fontSize:'12px',letterSpacing:'.08em'}},'✏️ '+(f.question?'Edit':'Tambah')+' Soal'),
      h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap'}},
        ['pg','mcma','tf',...(allowEssay?['essay']:['essay'])].map(t=>h('button',{key:t,onClick:()=>{upd('type')(t);if(t==='mcma')upd('correct_answer')([]);},style:{flex:'1 1 auto',padding:'8px',borderRadius:'8px',fontFamily:MONO,fontSize:'10px',cursor:'pointer',border:'1px solid',background:f.type===t?'var(--accent-bg)':'transparent',color:f.type===t?'var(--accent)':'var(--text-muted)',borderColor:f.type===t?'var(--accent-dim)':'var(--border)'}},{pg:'PG',mcma:'MCMA',essay:'Essay',tf:'B/S'}[t]))
      ),
      h('div',null,h('label',{style:LBL},'Pertanyaan'),h('textarea',{value:f.question,onChange:e=>upd('question')(e.target.value),rows:3,placeholder:'Tulis pertanyaan...',style:{...inSt,resize:'vertical'}})),
      h(MediaUploader,{value:f.media_url||null,onChange:v=>setF(p=>({...p,media_url:v,media_type:v?getMediaKind(v):null})),label:'Media Soal (Opsional)',accept:'image/*,audio/*,video/*',maxMB:10}),
      f.type==='pg'&&h('div',null,
        h('label',{style:LBL},'Pilihan Jawaban'),
        ['A','B','C','D','E'].map((ltr,i)=>h('div',{key:ltr,style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'}},
          h('span',{style:{fontFamily:MONO,fontSize:'11px',color:f.correct_answer===ltr?'#00ff88':'var(--text-dim)',minWidth:'20px',fontWeight:'bold'}},ltr+'.'),
          h('input',{type:'text',value:(f.options&&f.options[i])||'',onChange:e=>updOpt(i,e.target.value),placeholder:'Pilihan '+ltr,style:{...inSt,border:'1px solid '+(f.correct_answer===ltr?'rgba(0,255,136,.3)':'var(--border)')}}),
          h('input',{type:'radio',name:'correct',checked:f.correct_answer===ltr,onChange:()=>upd('correct_answer')(ltr),style:{width:'16px',height:'16px',accentColor:'#00ff88',cursor:'pointer'}})
        )),
        h('p',{style:{fontSize:'9px',fontFamily:MONO,color:'var(--text-dim)'}},'☝️ Pilih radio di kanan untuk menandai jawaban benar'),
        h('div',{style:{marginTop:'8px',padding:'10px',borderRadius:'10px',background:'rgba(0,240,255,.04)',border:'1px solid rgba(0,240,255,.1)'}},
          h('p',{style:{...LBL,marginBottom:'8px'}},'Media per Pilihan Jawaban (Opsional)'),
          ['A','B','C','D','E'].map((ltr,i)=>
            h('div',{key:ltr,style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px'}},
              h('span',{style:{fontFamily:MONO,fontSize:'11px',color:'var(--accent)',minWidth:'18px',fontWeight:'bold'}},ltr+'.'),
              h(MediaUploader,{compact:true,value:(f.option_media&&f.option_media[i])||null,onChange:v=>updOptMedia(i,v),accept:'image/*,audio/*',maxMB:3})
            )
          )
        )
      ),
      f.type==='mcma'&&h('div',null,
        h('label',{style:LBL},'Pilihan Jawaban (centang semua yang BENAR)'),
        h('p',{style:{fontSize:'9px',fontFamily:MONO,color:'rgba(168,85,247,.7)',marginBottom:'8px'}},'☝️ Bisa pilih lebih dari 1 jawaban benar'),
        ['A','B','C','D','E'].map((ltr,i)=>{
          const corrArr=Array.isArray(f.correct_answer)?f.correct_answer:[];
          const isCorrect=corrArr.includes(ltr);
          return h('div',{key:ltr,style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'}},
            h('span',{style:{fontFamily:MONO,fontSize:'11px',color:isCorrect?'#a855f7':'var(--text-dim)',minWidth:'20px',fontWeight:'bold'}},ltr+'.'),
            h('input',{type:'text',value:(f.options&&f.options[i])||'',onChange:e=>updOpt(i,e.target.value),placeholder:'Pilihan '+ltr,
              style:{...inSt,flex:1,border:'1px solid '+(isCorrect?'rgba(168,85,247,.4)':'var(--border)')}}),
            h('input',{type:'checkbox',checked:isCorrect,onChange:e=>{
              const arr=Array.isArray(f.correct_answer)?[...f.correct_answer]:[];
              upd('correct_answer')(e.target.checked?[...arr,ltr]:arr.filter(x=>x!==ltr));
            },style:{width:'18px',height:'18px',accentColor:'#a855f7',cursor:'pointer'}})
          );
        }),
        h('p',{style:{fontSize:'9px',fontFamily:MONO,color:'var(--text-dim)',marginTop:'4px'}},'Jawaban benar: '+(Array.isArray(f.correct_answer)&&f.correct_answer.length?f.correct_answer.join(', '):'belum dipilih')),
        h('div',{style:{marginTop:'8px',padding:'10px',borderRadius:'10px',background:'rgba(168,85,247,.04)',border:'1px solid rgba(168,85,247,.1)'}},
          h('p',{style:{...LBL,marginBottom:'8px'}},'Media per Pilihan Jawaban (Opsional)'),
          ['A','B','C','D','E'].map((ltr,i)=>
            h('div',{key:ltr,style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px'}},
              h('span',{style:{fontFamily:MONO,fontSize:'11px',color:'#a855f7',minWidth:'18px',fontWeight:'bold'}},ltr+'.'),
              h(MediaUploader,{compact:true,value:(f.option_media&&f.option_media[i])||null,onChange:v=>updOptMedia(i,v),accept:'image/*,audio/*',maxMB:3})
            )
          )
        )
      ),
      f.type==='tf'&&h('div',null,
        h('label',{style:LBL},'Jawaban Benar'),
        h('div',{style:{display:'flex',gap:'8px'}},
          ['BENAR','SALAH'].map(v=>h('button',{key:v,onClick:()=>upd('correct_answer')(v),style:{flex:1,padding:'10px',borderRadius:'10px',fontFamily:MONO,fontSize:'11px',cursor:'pointer',border:'1px solid',background:f.correct_answer===v?'var(--accent-bg)':'transparent',color:f.correct_answer===v?'var(--accent)':'var(--text-muted)',borderColor:f.correct_answer===v?'var(--accent-dim)':'var(--border)'}},v))
        )
      ),
      f.type==='essay'&&h('p',{style:{fontSize:'9px',fontFamily:MONO,color:'var(--text-muted)',padding:'8px',borderRadius:'8px',background:'rgba(168,85,247,.05)',border:'1px solid rgba(168,85,247,.15)'}},'ℹ️ Soal essay dinilai manual oleh guru/admin setelah ujian selesai.'),
      h('div',null,h('label',{style:LBL},'Bobot Nilai'),h('input',{type:'number',min:1,max:100,value:f.score||1,onChange:e=>upd('score')(parseInt(e.target.value)||1),style:inSt})),
      h('div',{style:{display:'flex',gap:'8px',marginTop:'4px'}},
        h('button',{onClick:onClose,style:{flex:1,padding:'10px',borderRadius:'10px',border:'1px solid var(--border)',background:'transparent',color:'var(--text-muted)',cursor:'pointer',fontFamily:MONO,fontSize:'11px'}},'Batal'),
        h('button',{onClick:()=>onSave({...f,option_media:f.option_media||[]}),disabled:!f.question,style:{flex:2,padding:'10px',borderRadius:'10px',background:'var(--accent-bg)',border:'1px solid var(--accent-dim)',color:'var(--accent)',cursor:'pointer',fontFamily:MONO,fontSize:'11px',opacity:!f.question?0.4:1}},'💾 Simpan')
      )
    )
  );
}

// ── Hasil Ujian Admin ──────────────────────────────────────────────
function CbtResultAdmin({exams}) {
  const [selExam,setSelExam]=useState('');
  const [sessions,setSessions]=useState([]);
  const [loading,setLoading]=useState(false);
  const [detailSes,setDetailSes]=useState(null);
  const [questions,setQuestions]=useState([]);

  const loadResult=async(examId)=>{
    setLoading(true);setSelExam(examId);
    const [s,q]=await Promise.all([DB.getCbtSessions(examId),DB.getCbtQuestions(examId)]);
    setSessions(s);setQuestions(q);setLoading(false);
  };

  const scoreColor=s=>s>=80?'#00ff88':s>=60?'#facc15':s>=40?'#fb923c':'#f87171';

  return h('div',null,
    h('div',{style:{marginBottom:'16px'}},
      h('label',{style:LBL},'Pilih Ujian'),

// ── Detail Sesi Siswa ──────────────────────────────────────────────
function CbtSessionDetail({session,questions,onClose,onSave}) {
  const [essayScores,setEssayScores]=useState({});
  const ans=session.answers||{};
  const viol=session.violations||[];
  const photos=session.photos||[];

  const calcScore=()=>{
    let total=0,maxScore=0;
    questions.forEach(q=>{
      maxScore+=q.score||1;
      if(q.type==='pg'||q.type==='tf'){
        if(ans[q.id]===q.correct_answer) total+=q.score||1;
      } else if(q.type==='mcma'){
        const corrArr=Array.isArray(q.correct_answer)?q.correct_answer:[];
        const stuArr=Array.isArray(ans[q.id])?ans[q.id]:[];
        if(corrArr.length>0){
          const perItem=(q.score||1)/corrArr.length;
          let pts=0;
          corrArr.forEach(c=>{if(stuArr.includes(c))pts+=perItem;});
          stuArr.forEach(s=>{if(!corrArr.includes(s))pts-=perItem;});
          total+=Math.max(0,Math.round(pts*10)/10);
        }
      } else if(q.type==='essay'){
        total+=essayScores[q.id]||0;
      }
    });
    return maxScore>0?Math.round((total/maxScore)*100):0;
  };

  return h('div',{onClick:onClose,style:{position:'fixed',inset:0,zIndex:250,background:'rgba(0,0,0,.8)',backdropFilter:'blur(4px)',display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'16px',overflowY:'auto'}},
    h('div',{onClick:e=>e.stopPropagation(),style:{width:'min(600px,100%)',background:'var(--bg-panel-s)',borderRadius:'20px',border:'1px solid var(--accent-dim)',padding:'24px',display:'flex',flexDirection:'column',gap:'16px',marginTop:'8px',marginBottom:'32px'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
        h('div',null,
          h('h3',{style:{fontFamily:ORB,color:'var(--accent)',fontSize:'14px'}},'📊 Detail Hasil'),
          h('p',{style:{fontFamily:MONO,fontSize:'10px',color:'var(--text-muted)',marginTop:'2px'}},session.student_name+' — '+session.student_code)
        ),
        h('button',{onClick:onClose,style:{padding:'6px 12px',borderRadius:'8px',border:'1px solid var(--border)',background:'transparent',color:'var(--text-muted)',cursor:'pointer',fontFamily:MONO,fontSize:'10px'}},'✕')
      ),

      // Violations
      viol.length>0&&h('div',{style:{padding:'12px',borderRadius:'12px',background:'rgba(239,68,68,.06)',border:'1px solid rgba(239,68,68,.2)'}},
        h('p',{style:{fontFamily:ORB,fontSize:'10px',color:'#f87171',marginBottom:'8px'}},'⚠️ PELANGGARAN ('+viol.length+')'),
        viol.map((v,i)=>h('p',{key:i,style:{fontFamily:MONO,fontSize:'9px',color:'rgba(239,68,68,.7)',marginBottom:'2px'}},
          '• '+new Date(v.time).toLocaleTimeString('id-ID')+': '+v.type
        ))
      ),

      // Photos
      photos.length>0&&h('div',null,
        h('p',{style:{fontFamily:MONO,fontSize:'10px',color:'var(--text-muted)',marginBottom:'8px'}},'📷 Foto Pengawasan ('+photos.length+')'),
        h('div',{style:{display:'flex',gap:'8px',overflowX:'auto',paddingBottom:'4px'}},
          photos.map((p,i)=>h('img',{key:i,src:p,style:{width:'80px',height:'60px',borderRadius:'8px',objectFit:'cover',border:'1px solid var(--border)',flexShrink:0}}))
        )
      ),

      // Questions
      h('div',{style:{display:'flex',flexDirection:'column',gap:'10px',maxHeight:'400px',overflowY:'auto'}},
        questions.map((q,qi)=>{
          const stuAns=ans[q.id];
          const correct=q.type==='pg'||q.type==='tf'?stuAns===q.correct_answer:null;
          return h('div',{key:q.id,style:{padding:'12px',borderRadius:'10px',background:'var(--bg-card)',border:'1px solid '+(correct===true?'rgba(0,255,136,.2)':correct===false?'rgba(239,68,68,.2)':'var(--border)')}},
            h('p',{style:{fontFamily:MONO,fontSize:'10px',color:'var(--text-secondary)',marginBottom:'6px'}},
              h('span',{style:{color:'var(--accent)',fontWeight:'bold'}},(qi+1)+'. '),q.question),
            q.media_url&&h(MediaViewer,{url:q.media_url,style:{marginBottom:'8px',maxHeight:'200px'}}),
            q.type==='mcma'?h('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap'}},
              h('span',{style:{fontSize:'9px',fontFamily:MONO,padding:'2px 8px',borderRadius:'4px',background:'rgba(168,85,247,.1)',color:'#a855f7'}},'Dijawab: '+(Array.isArray(stuAns)&&stuAns.length?stuAns.join(', '):'—')),
              h('span',{style:{fontSize:'9px',fontFamily:MONO,padding:'2px 8px',borderRadius:'4px',background:'rgba(0,255,136,.1)',color:'#00ff88'}},'Kunci: '+(Array.isArray(q.correct_answer)?q.correct_answer.join(', '):q.correct_answer)),
              h('span',{style:{fontSize:'9px',fontFamily:MONO,color:'#a855f7'}},'MCMA (Parsial)')
            ):
            q.type!=='essay'?h('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap'}},
              h('span',{style:{fontSize:'9px',fontFamily:MONO,padding:'2px 8px',borderRadius:'4px',background:'rgba(0,240,255,.1)',color:'#00f0ff'}},'Dijawab: '+(stuAns||'—')),
              h('span',{style:{fontSize:'9px',fontFamily:MONO,padding:'2px 8px',borderRadius:'4px',background:'rgba(0,255,136,.1)',color:'#00ff88'}},'Benar: '+q.correct_answer),
              h('span',{style:{fontSize:'9px',fontFamily:MONO,color:correct?'#00ff88':'#f87171'}},correct?'✅ Benar':'❌ Salah')
            ):h('div',null,
              h('p',{style:{fontSize:'10px',fontFamily:MONO,color:'var(--text-muted)',padding:'8px',borderRadius:'8px',background:'var(--bg-panel)',border:'1px solid var(--border)',marginBottom:'6px'}},stuAns||'(Tidak dijawab)'),
              h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
                h('label',{style:{...LBL,margin:0}},'Nilai essay (0-'+q.score+'):'),
                h('input',{type:'number',min:0,max:q.score,value:essayScores[q.id]||0,onChange:e=>setEssayScores(p=>({...p,[q.id]:parseInt(e.target.value)||0})),style:{width:'60px',padding:'4px 8px',borderRadius:'6px',background:'var(--input-bg)',border:'1px solid var(--border)',color:'var(--text-primary)',fontFamily:MONO,fontSize:'11px'}})
              )
            )
          );
        })
      ),

      h('div',{style:{display:'flex',gap:'10px',marginTop:'4px'}},
        h('button',{onClick:onClose,style:{flex:1,padding:'12px',borderRadius:'12px',border:'1px solid var(--border)',background:'transparent',color:'var(--text-muted)',cursor:'pointer',fontFamily:MONO}},'Tutup'),
        h('button',{onClick:()=>onSave(session.id,calcScore()),style:{flex:2,padding:'12px',borderRadius:'12px',background:'var(--accent-bg)',border:'1px solid var(--accent-dim)',color:'var(--accent)',cursor:'pointer',fontFamily:MONO,fontSize:'12px',fontWeight:'bold'}},'💾 Simpan Nilai ('+calcScore()+')')
      )
    )
  );
}

// STUDENT CBT — Tampilan & Pengerjaan Ujian Siswa
